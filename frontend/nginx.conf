server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle the /achieve path
    location /achieve {
        # With basePath: "/achieve", files are generated without the /achieve prefix in the 'out' dir
        # but internal links expect /achieve/...
        # We can either place the files in a subfolder or alias them.
        
        alias /usr/share/nginx/html;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Redirect root to /achieve
    location = / {
        return 301 /achieve;
    }

    # Optional: Handle assets that might be requested without prefix
    location /_next {
        alias /usr/share/nginx/html/_next;
    }

    error_page 404 /404.html;
}
